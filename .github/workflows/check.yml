name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  basic-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check HTML formatting
        run: npx prettier@3.6.2 --check "*.html"

      - name: Check README links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md
